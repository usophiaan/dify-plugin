model: claude-sonnet-4-6
label:
  zh_Hans: claude-sonnet-4-6
  en_US: claude-sonnet-4-6
model_type: llm
features:
  - multi-tool-call
  - agent-thought
  - stream-tool-call
  - vision
  - tool-call
model_properties:
  mode: chat
  context_size: 1000000
parameter_rules:
  - name: temperature
    use_template: temperature
  - name: top_p
    use_template: top_p
  - name: presence_penalty
    use_template: presence_penalty
  - name: frequency_penalty
    use_template: frequency_penalty
  - name: max_tokens
    use_template: max_tokens
    default: 512
    min: 1
    max: 65535
  - name: response_format
    use_template: response_format
# Tiered pricing (0, 200K]: input 21.36, output 106.8, cache_write 26.7, cache_read 2.13 CNY/M tokens
# Tiered pricing (200K, 1M]: input 42.72, output 160.2, cache_write 53.4, cache_read 4.27 CNY/M tokens
pricing:
  input: '0.02136'
  output: '0.1068'
  unit: '0.001'
  currency: CNY
