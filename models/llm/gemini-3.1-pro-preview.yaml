model: gemini-3.1-pro-preview
label:
  zh_Hans: gemini-3.1-pro-preview
  en_US: gemini-3.1-pro-preview
model_type: llm
features:
  - multi-tool-call
  - agent-thought
  - stream-tool-call
  - vision
  - tool-call
model_properties:
  mode: chat
  context_size: 1000000
parameter_rules:
  - name: temperature
    use_template: temperature
  - name: top_p
    use_template: top_p
  - name: presence_penalty
    use_template: presence_penalty
  - name: frequency_penalty
    use_template: frequency_penalty
  - name: max_tokens
    use_template: max_tokens
    default: 512
    min: 1
    max: 65535
  - name: response_format
    use_template: response_format
# Tiered pricing (per million tokens):
#   (0, 200K]:   input 14.24 CNY/M,  output  85.44 CNY/M,  cache hit 1.42 CNY/M
#   (200K, 1M]:  input 28.48 CNY/M,  output 128.16 CNY/M,  cache hit 2.84 CNY/M
pricing:
  input: '0.01424'
  output: '0.08544'
  unit: '0.001'
  currency: CNY
