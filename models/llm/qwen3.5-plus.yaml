model: qwen3.5-plus
label:
  zh_Hans: Qwen3.5-Plus
  en_US: Qwen3.5-Plus
model_type: llm
features:
  - multi-tool-call
  - agent-thought
  - stream-tool-call
  - vision
  - tool-call
model_properties:
  mode: chat
  context_size: 1000000
parameter_rules:
  - name: temperature
    use_template: temperature
  - name: top_p
    use_template: top_p
  - name: presence_penalty
    use_template: presence_penalty
  - name: frequency_penalty
    use_template: frequency_penalty
  - name: max_tokens
    use_template: max_tokens
    default: 512
    min: 1
    max: 65535
  - name: response_format
    use_template: response_format
# Tiered pricing (per million tokens):
#   (0, 128K]:   input  0.8 CNY/M,  output  4.8 CNY/M
#   (128K, 256K]:input  2   CNY/M,  output 12   CNY/M
#   (256K, 1M]:  input  4   CNY/M,  output 24   CNY/M
pricing:
  input: '0.0008'
  output: '0.0048'
  unit: '0.001'
  currency: CNY
